server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 정적 자산 장기 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 은 캐시하지 않음(배포 반영)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: 미매칭 경로는 index.html 로
    location / {
        try_files $uri $uri/ /index.html;
    }
}

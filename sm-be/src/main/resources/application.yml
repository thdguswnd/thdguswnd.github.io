server:
  port: 7080

spring:
  application:
    name: sm-be
  profiles:
    active: local
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

# 청첩장 도메인 설정
wedding:
  wedding-date: "2026-11-15"
  rsvp:
    retention-months: 3
  gallery:
    signed-url-ttl-minutes: 15
    cache-ttl-minutes: 5
  instagram:
    feed-limit: 9
    cache-ttl-minutes: 10
    api-timeout-ms: 3000
  cors:
    allowed-origins: "http://localhost:5173"

# Rate limit (공개 엔드포인트)
ratelimit:
  rsvp:
    per-minute: 5
    per-hour: 30

# Resilience4j (Instagram 외부 호출)
resilience4j:
  circuitbreaker:
    instances:
      instagram:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      instagram:
        max-attempts: 2
        wait-duration: 500ms
  timelimiter:
    instances:
      instagram:
        timeout-duration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    db:
      enabled: true

logging:
  level:
    root: INFO
    com.wedding.invitation: INFO

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/wedding;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

wedding:
  storage:
    provider: local
  instagram:
    mock: true

---
spring:
  config:
    activate:
      on-profile: gcp
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

wedding:
  storage:
    provider: gcs
    bucket: ${GCS_BUCKET}
  instagram:
    mock: false

---
spring:
  config:
    activate:
      on-profile: azure
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

wedding:
  storage:
    provider: azure-blob
    bucket: ${AZURE_BLOB_CONTAINER}
    account: ${AZURE_STORAGE_ACCOUNT}
  instagram:
    mock: false

# AKS Workload Identity 용 ServiceAccount.
# 사용자 할당 매니지드 ID(client-id)를 이 SA 에 연결(federated credential)하여,
# 파드가 키 파일 없이 Key Vault(및 Blob) 에 접근한다.
# <MANAGED_IDENTITY_CLIENT_ID>, <AZURE_TENANT_ID> 는 런북 절차에서 실제 값으로 치환.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sm-be
  annotations:
    azure.workload.identity/client-id: "<MANAGED_IDENTITY_CLIENT_ID>"
    azure.workload.identity/tenant-id: "<AZURE_TENANT_ID>"
  labels:
    azure.workload.identity/use: "true"

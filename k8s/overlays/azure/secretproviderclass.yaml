# Azure Key Vault → K8s Secret 동기화 (Secrets Store CSI Driver, Azure provider).
# secretObjects 가 K8s Secret `sm-be-secrets` 를 생성/동기화하며, deployment-patch 의 secretKeyRef 가 이를 참조한다.
# 사전 요구: AKS 에 Azure Key Vault Provider for Secrets Store CSI Driver 애드온 활성화
#   az aks enable-addons --addons azure-keyvault-secrets-provider ...
# <...> 플레이스홀더는 런북 절차에서 실제 값으로 치환.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sm-be-kv
spec:
  provider: azure
  secretObjects:
    - secretName: sm-be-secrets
      type: Opaque
      data:
        - objectName: db-url
          key: db-url
        - objectName: db-username
          key: db-username
        - objectName: db-password
          key: db-password
        - objectName: blob-container
          key: blob-container
        - objectName: storage-account
          key: storage-account
        - objectName: instagram-token
          key: instagram-token
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    # Workload Identity 사용: ServiceAccount 에 연결된 사용자 할당 ID
    clientID: "<MANAGED_IDENTITY_CLIENT_ID>"
    keyvaultName: "<KEYVAULT_NAME>"
    tenantId: "<AZURE_TENANT_ID>"
    # Key Vault 에 등록된 secret 이름 목록 (objectName 은 secretObjects 와 일치)
    objects: |
      array:
        - |
          objectName: db-url
          objectType: secret
        - |
          objectName: db-username
          objectType: secret
        - |
          objectName: db-password
          objectType: secret
        - |
          objectName: blob-container
          objectType: secret
        - |
          objectName: storage-account
          objectType: secret
        - |
          objectName: instagram-token
          objectType: secret

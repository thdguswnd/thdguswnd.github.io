# AKS: ingress-nginx + cert-manager. (대안: Application Gateway Ingress Controller)
# <wedding.example.com> 은 실제 도메인으로 치환. cert-manager cluster-issuer 는 런북에서 설치.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wedding-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wedding.example.com
      secretName: wedding-tls
  rules:
    - host: wedding.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sm-be
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sm-fe
                port:
                  number: 80

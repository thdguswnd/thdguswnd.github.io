# Azure(AKS) 오버레이 — PRIMARY 배포 타깃 (2026-07-18~).
# 공통 base 를 재사용하고 provider-specific 요소(Ingress, TLS, 시크릿, 프로파일, 워크로드 인증)만 교체한다.
# 배포 절차: aidlc-docs/construction/build-and-test/aks-deployment-runbook.md
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wedding
resources:
  - ../../base
  - serviceaccount.yaml
  - secretproviderclass.yaml
  - ingress.yaml
patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: sm-be
# 이미지 불변 태그(커밋 SHA)로 치환하여 배포 (latest 금지).
# <ACR_NAME> 은 az acr create 로 만든 레지스트리 이름으로 치환.
images:
  - name: sm-be
    newName: <ACR_NAME>.azurecr.io/wedding/sm-be
    newTag: "REPLACE_WITH_COMMIT_SHA"
  - name: sm-fe
    newName: <ACR_NAME>.azurecr.io/wedding/sm-fe
    newTag: "REPLACE_WITH_COMMIT_SHA"

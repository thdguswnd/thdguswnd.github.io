apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wedding
resources:
  - ../../base
  - ingress.yaml
  - managed-certificate.yaml
patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: sm-be
# 이미지 불변 태그(커밋 SHA)로 치환하여 배포 (latest 금지)
images:
  - name: sm-be
    newName: REGION-docker.pkg.dev/PROJECT_ID/wedding/sm-be
    newTag: "REPLACE_WITH_COMMIT_SHA"

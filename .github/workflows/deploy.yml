name: Deploy to GitHub Pages

# main 브랜치에 push 되면 sm-fe 를 빌드해 GitHub Pages 로 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build (sm-fe)
        working-directory: sm-fe
        run: |
          yarn install --frozen-lockfile
          yarn build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: sm-fe/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
